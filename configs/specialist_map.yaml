    note: "Pregnancy-related topics are commonly handled by an OB/GYN."

  allergies:
    specialists:
      - Allergist / Immunologist
    note: "Allergy topics are commonly handled by an allergist."

  cancer-awareness:
    specialists:
      - Oncologist
    note: "Cancer-related topics are commonly handled by an oncologist."

  child-health:
    specialists:
      - Pediatrician
    note: "Child health topics are commonly handled by a pediatrician."

  senior-health:
    specialists:
      - Geriatrician
    note: "Senior health topics are commonly handled by a geriatrician."

  chronic-pain:
    specialists:
      - Pain Management Specialist
      - Neurologist
    note: "Chronic pain topics are commonly handled by a pain management specialist."

  infectious-disease:
    specialists:
      - Infectious Disease Specialist
    note: "Infectious disease topics are commonly handled by an infectious disease specialist."

  nutrition:
