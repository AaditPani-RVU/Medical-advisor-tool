    specialists:
      - Sports Medicine Physician
      - Orthopedic Specialist
    note: "Sports injury topics are commonly handled by a sports medicine physician or orthopedic specialist."

  fractures-sprains:
    specialists:
      - Orthopedic Specialist
      - Emergency Medicine
    note: "Fracture and sprain topics are commonly handled by an orthopedic specialist."

  burns-wounds:
