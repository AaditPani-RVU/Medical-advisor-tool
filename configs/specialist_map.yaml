# ============================================================
# Verified Health Content — Specialist Type Navigation Map
# ============================================================
# Maps topic/symptom clusters to specialist categories.
# Used for NAVIGATION only — NOT diagnosis.
# Language: "This topic is commonly handled by ..."

default_specialist: Primary Care Physician

mappings:
  heart-health:
    specialists:
      - Cardiologist
      - Emergency Medicine (if chest pain / emergency symptoms)
    note: "Heart-related topics are commonly handled by a cardiologist."

  diabetes:
    specialists:
      - Endocrinologist
    note: "Diabetes and blood sugar management topics are commonly handled by an endocrinologist."

  thyroid:
    specialists:
      - Endocrinologist
    note: "Thyroid-related topics are commonly handled by an endocrinologist."

  respiratory:
    specialists:
      - Pulmonologist
    note: "Respiratory and lung-related topics are commonly handled by a pulmonologist."

  skin-conditions:
    specialists:
      - Dermatologist
    note: "Skin-related topics are commonly handled by a dermatologist."

  digestive-health:
    specialists:
      - Gastroenterologist
    note: "Digestive health topics are commonly handled by a gastroenterologist."

  mental-health:
    specialists:
      - Psychiatrist
      - Psychologist
    note: "Mental health topics are commonly handled by a psychiatrist or psychologist."

  bone-joint:
    specialists:
      - Orthopedic Specialist
      - Rheumatologist
    note: "Bone and joint topics are commonly handled by an orthopedic specialist or rheumatologist."

  eye-health:
    specialists:
      - Ophthalmologist
    note: "Eye health topics are commonly handled by an ophthalmologist."

  ear-nose-throat:
    specialists:
      - ENT Specialist (Otolaryngologist)
    note: "Ear, nose, and throat topics are commonly handled by an ENT specialist."

  dental-health:
    specialists:
      - Dentist
    note: "Dental topics are commonly handled by a dentist."

  womens-health:
    specialists:
      - OB/GYN
    note: "Women's health topics are commonly handled by an OB/GYN."

  pregnancy:
