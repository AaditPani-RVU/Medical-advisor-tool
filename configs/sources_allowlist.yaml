  - ninds.nih.gov         # National Institute of Neurological Disorders
  - niddk.nih.gov         # National Institute of Diabetes & Digestive & Kidney
  - nhlbi.nih.gov         # National Heart, Lung, and Blood Institute
  - nei.nih.gov           # National Eye Institute
  - niaid.nih.gov         # National Institute of Allergy & Infectious Diseases
  - rarediseases.org      # National Organization for Rare Disorders

  # ── India: Central Government ────────────────────────────
  - nhp.gov.in            # National Health Portal
  - mohfw.gov.in          # Ministry of Health & Family Welfare
  - nhm.gov.in            # National Health Mission
  - icmr.gov.in           # Indian Council of Medical Research
  - main.icmr.nic.in      # ICMR alternate domain
  - fssai.gov.in          # Food Safety & Standards Authority

  # ── India: Premier Medical Institutes ────────────────────
  - aiims.edu             # All India Institute of Medical Sciences
  - pgimer.edu.in         # PGIMER Chandigarh
  - nimhans.ac.in         # NIMHANS Bangalore
  - jipmer.edu.in         # JIPMER Puducherry

  # ── India: Major Hospital Chains ─────────────────────────
  - apollohospitals.com   # Apollo Hospitals
  - fortishealthcare.com  # Fortis Healthcare
  - medanta.org           # Medanta - The Medicity
  - maxhealthcare.in      # Max Healthcare
  - narayanahealth.org    # Narayana Health

